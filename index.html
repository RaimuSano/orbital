<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>オービット・マスター：衛星飛来Ver.2.3</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 0 0 5px #000; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 5px; font-size: 0.85em; z-index: 10; border-left: 3px solid #00ffff; }
        .data-val { color: #00ff00; font-weight: bold; }
        .orbit-count { font-size: 1.3em; color: #00ffff; margin-bottom: 5px; }
        
        .btn-panel { position: absolute; bottom: 20px; left: 10px; display: flex; gap: 8px; z-index: 20; }
        .ui-btn { background: rgba(0,255,255,0.15); color: #00ffff; border: 1px solid #00ffff; padding: 10px 15px; font-size: 0.75em; cursor: pointer; border-radius: 4px; pointer-events: auto; font-weight: bold; }
        
        #time-ctrl { position: absolute; bottom: 20px; right: 10px; background: rgba(255,50,50,0.1); border: 1px solid #ff3333; padding: 10px; border-radius: 8px; width: 130px; z-index: 10; pointer-events: auto; }
        input[type=range] { width: 100%; cursor: pointer; }

        .warning { color: #ff3333; font-weight: bold; font-size: 1.4em; text-shadow: 0 0 10px #ff0000; }
        .success { color: #00ffff; font-weight: bold; font-size: 1.8em; text-shadow: 0 0 15px #00ffff; }
        #msg { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: 90%; z-index: 15; }
        
        #nasa-alert { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-weight: bold; font-size: 2em; display: none; text-shadow: 0 0 20px #f00; z-index: 100; pointer-events: none; border: 2px solid #f00; padding: 10px 20px; background: rgba(0,0,0,0.7); }

        button#reset-btn { position: absolute; top: 75%; left: 50%; transform: translate(-50%, -50%); background: #00ffff; color: #000; border: none; padding: 15px 40px; font-size: 1.1em; cursor: pointer; display: none; pointer-events: auto; font-weight: bold; border-radius: 50px; box-shadow: 0 0 15px rgba(0,255,255,0.5); }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,15,25,0.95); border: 2px solid #00ffff; padding: 25px; width: 85%; max-width: 420px; z-index: 100; font-size: 0.85em; line-height: 1.7; border-radius: 12px; box-shadow: 0 0 40px #00ffff; }
        .close-btn { color: #ff4444; float: right; cursor: pointer; font-weight: bold; font-size: 1.2em; }
        h3 { color: #00ffff; border-bottom: 1px solid #00ffff; padding-bottom: 5px; margin-top: 0; }
        .setting-row { margin-bottom: 15px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="nasa-alert">⚠ SATURATION LAUNCH ⚠</div>

<div id="ui">
    <div class="orbit-count">周回数: <span id="orbit-val">0.0</span> / <span id="target-orbit-display">10</span></div>
    <div>最大高度: <span id="max-dist-val" class="data-val">0</span> km</div>
    <div>現在速度: <span id="speed-val" class="data-val">0.0</span> km/s</div>
    <div>通信状態: <span id="signal-val">良好</span></div>
</div>

<div class="btn-panel">
    <div class="ui-btn" onclick="showModal('settings')">設定</div>
    <div class="ui-btn" onclick="showModal('rules')">ルール</div>
    <div class="ui-btn" onclick="showModal('ctrl')">操作</div>
</div>

<div id="time-ctrl">
    <div style="font-size: 0.7em; text-align: center; margin-bottom: 5px;">時間速度: <span id="time-display">2.0x</span></div>
    <input type="range" id="time-slider" min="0" max="5" step="0.1" value="2.0">
</div>

<div id="msg">
    <h2 id="main-msg" style="margin:0; color:#00ffff; letter-spacing: 2px;">ミッション：地球を<span id="target-orbit-msg">10</span>周せよ</h2>
    <div id="status-msg"></div>
    <div id="score-details" style="margin-top:15px; font-size:1em; display:none; background: rgba(0,255,255,0.1); padding: 10px; border-radius: 8px;"></div>
</div>

<button id="reset-btn" onclick="resetGame()">再打ち上げ</button>

<div id="modal">
    <span class="close-btn" onclick="closeModal()">[ 閉じる ]</span>
    <div id="modal-content"></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiOrbit = document.getElementById('orbit-val'), uiMaxDist = document.getElementById('max-dist-val');
    const uiSpeed = document.getElementById('speed-val'), uiStatus = document.getElementById('status-msg');
    const uiSignal = document.getElementById('signal-val'), mainMsg = document.getElementById('main-msg');
    const resetBtn = document.getElementById('reset-btn'), scoreDetails = document.getElementById('score-details');
    const timeSlider = document.getElementById('time-slider'), timeDisplay = document.getElementById('time-display');
    const nasaAlert = document.getElementById('nasa-alert');

    let screenScale = 1.0, stars = [], particles = [];

    // モード設定
    let targetOrbits = 10;
    let hasMoon = true;
    let hasAiMission = true;

    // AI打ち上げ設定 (12秒 = 720フレーム)
    let aiSats = [];
    const LAUNCH_CYCLE = 720; 
    const WARNING_TIME = 180; 
    let launchTimer = LAUNCH_CYCLE - 120; // 開始2秒後
    let warningInfo = { active: false, angle: 0 };

    function setCanvasSize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        screenScale = Math.min(canvas.width, canvas.height) / 500;
        initStars();
    }
    window.addEventListener('resize', setCanvasSize);
    setCanvasSize();

    function initStars() {
        stars = [];
        for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, opacity: Math.random() });
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<45; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18, life: 1.0, color: color || `hsl(${Math.random()*50+10}, 100%, 60%)` });
    }

    const GM_EARTH = 200000 * screenScale, GM_MOON = 18000 * screenScale;
    let TIME_SCALE = 2.0;
    const earthR = 45 * screenScale, moonR = 12 * screenScale, moonOrbitR = 190 * screenScale, swipeSens = 0.35;
    const maxBoundaryR = 250 * screenScale;

    let moonAngle = Math.random() * Math.PI * 2;
    let sat = { x: 0, y: 0, vx: 0, vy: 0, trail: [], angleSum: 0, lastAngle: 0, maxR: 0, totalEcc: 0, eccCount: 0, opacity: 1.0 };
    let moon = { x: 0, y: 0 };
    let isLaunching = true, isSwiping = false, swipeStart = {x:0, y:0}, swipeEnd = {x:0, y:0}, gameState = 'ready';

    timeSlider.oninput = (e) => { TIME_SCALE = parseFloat(e.target.value); timeDisplay.innerText = TIME_SCALE.toFixed(1) + "x"; };
    const centerX = () => canvas.width / 2, centerY = () => canvas.height / 2;

    function getAcc(p, mPos) {
        const dx = centerX() - p.x, dy = centerY() - p.y, rSq = dx*dx + dy*dy, r = Math.sqrt(rSq);
        let ax = (dx/r)*(GM_EARTH/rSq), ay = (dy/r)*(GM_EARTH/rSq), rM = 999;
        if(hasMoon) {
            const dxM = mPos.x - p.x, dyM = mPos.y - p.y, rMSq = dxM*dxM + dyM*dyM;
            rM = Math.sqrt(rMSq);
            ax += (dxM/rM)*(GM_MOON/rMSq); ay += (dyM/rM)*(GM_MOON/rMSq);
        }
        return { ax, ay, rE: r, rM };
    }

    // NASA衛星の射出ロジック
    function spawnAiSat(angle) {
        const dist = earthR + 5;
        const x = centerX() + Math.cos(angle) * dist;
        const y = centerY() + Math.sin(angle) * dist;
        
        // 速度
        const orbitalVel = Math.sqrt(GM_EARTH / dist) * (1.0 + Math.random() * 0.4);
        
        // 射出角度の計算:
        // 地球の中心方向から180度反転（＝真上/法線方向）を基準に、±80度の扇形
        const variation = (Math.random() - 0.5) * 2 * (80 * Math.PI / 180);
        const launchAngle = angle + variation;

        const vx = Math.cos(launchAngle) * orbitalVel;
        const vy = Math.sin(launchAngle) * orbitalVel;
        aiSats.push({ x, y, vx, vy, trail: [], opacity: 1.0 });
    }

    function gameLoop() {
        let dt = 0.016 * TIME_SCALE;
        moonAngle += 0.005 * TIME_SCALE;
        moon.x = centerX() + Math.cos(moonAngle) * moonOrbitR;
        moon.y = centerY() + Math.sin(moonAngle) * moonOrbitR;

        if (isLaunching) {
            sat.x = centerX(); sat.y = centerY() - earthR - 35; 
            sat.angleSum = 0; sat.opacity = 1.0; sat.trail = [];
            sat.lastAngle = Math.atan2(sat.y - centerY(), sat.x - centerX());
            sat.maxR = 0; sat.totalEcc = 0; sat.eccCount = 0; 
            aiSats = []; launchTimer = LAUNCH_CYCLE - 120; warningInfo.active = false;
        } else if (gameState === 'orbiting' || (gameState === 'lost_signal' && sat.opacity > 0)) {
            
            if (hasAiMission) {
                launchTimer += 1 * TIME_SCALE;
                if (launchTimer >= (LAUNCH_CYCLE - WARNING_TIME) && !warningInfo.active) {
                    warningInfo.active = true;
                    warningInfo.angle = Math.random() * Math.PI * 2;
                    nasaAlert.style.display = 'block';
                }
                if (launchTimer >= LAUNCH_CYCLE) {
                    spawnAiSat(warningInfo.angle);
                    launchTimer = 0;
                    warningInfo.active = false;
                    nasaAlert.style.display = 'none';
                }
            }

            const substeps = 8;
            for(let i=0; i<substeps; i++) {
                let a = getAcc(sat, moon);
                if (gameState === 'orbiting') {
                    if(a.rE < earthR) { gameState = 'crashed_earth'; createExplosion(sat.x, sat.y); break; }
                    if(hasMoon && a.rM < moonR) { gameState = 'crashed_moon'; createExplosion(sat.x, sat.y); break; }
                    if(a.rE > maxBoundaryR) { gameState = 'lost_signal'; } 
                    
                    for (let ai of aiSats) {
                        if (Math.hypot(sat.x - ai.x, sat.y - ai.y) < 8 * screenScale) {
                            gameState = 'crashed_ai';
                            createExplosion(sat.x, sat.y, '#ff00ff');
                            createExplosion(ai.x, ai.y, '#ff00ff');
                            break;
                        }
                    }
                }
                
                sat.vx += a.ax * (dt/substeps); sat.vy += a.ay * (dt/substeps);
                sat.x += sat.vx * (dt/substeps); sat.y += sat.vy * (dt/substeps);

                // スコア計算用データの更新
                if (gameState === 'orbiting') {
                    if(a.rE > sat.maxR) sat.maxR = a.rE;
                    const vSq = sat.vx*sat.vx + sat.vy*sat.vy;
                    const h = (sat.x-centerX())*sat.vy - (sat.y-centerY())*sat.vx;
                    const energy = vSq/2 - GM_EARTH/a.rE;
                    const ecc = Math.sqrt(Math.max(0, 1 + (2*energy*h*h)/(GM_EARTH**2)));
                    sat.totalEcc += ecc; sat.eccCount++;
                }

                aiSats.forEach((ai, idx) => {
                    let aAi = getAcc(ai, moon);
                    ai.vx += aAi.ax * (dt/substeps); ai.vy += aAi.ay * (dt/substeps);
                    ai.x += ai.vx * (dt/substeps); ai.y += ai.vy * (dt/substeps);
                    if (aAi.rE < earthR || (hasMoon && aAi.rM < moonR)) {
                        createExplosion(ai.x, ai.y, '#aaa');
                        aiSats.splice(idx, 1);
                    }
                });
            }

            // 圏外でのフェード演出
            if (gameState === 'lost_signal') { 
                sat.opacity -= dt / 1.5; if (sat.opacity < 0) sat.opacity = 0; 
            }

            if (gameState === 'orbiting') {
                let curA = Math.atan2(sat.y - centerY(), sat.x - centerX());
                let diff = curA - sat.lastAngle;
                if (diff > Math.PI) diff -= Math.PI * 2; if (diff < -Math.PI) diff += Math.PI * 2;
                sat.angleSum += diff; sat.lastAngle = curA;
                if(Math.abs(sat.angleSum) / (Math.PI * 2) >= targetOrbits) gameState = 'success';
            }
            if(Math.random() > 0.4 && sat.opacity > 0) {
                sat.trail.push({x:sat.x, y:sat.y, op: sat.opacity}); if(sat.trail.length > 800) sat.trail.shift();
                aiSats.forEach(ai => {
                    ai.trail.push({x:ai.x, y:ai.y, op: 0.5}); if(ai.trail.length > 300) ai.trail.shift();
                });
            }
        }
        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i, 1); });
        draw();
        requestAnimationFrame(gameLoop);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => { ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); });
        
        if (warningInfo.active) {
            ctx.beginPath(); ctx.moveTo(centerX(), centerY());
            ctx.lineTo(centerX() + Math.cos(warningInfo.angle)*500, centerY() + Math.sin(warningInfo.angle)*500);
            ctx.strokeStyle = `rgba(255, 50, 50, ${0.4 + Math.abs(Math.sin(Date.now()*0.012))*0.5})`;
            ctx.setLineDash([10, 5]); ctx.lineWidth = 3; ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle = '#f33'; ctx.beginPath();
            ctx.arc(centerX() + Math.cos(warningInfo.angle)*earthR, centerY() + Math.sin(warningInfo.angle)*earthR, 6, 0, Math.PI*2); ctx.fill();
        }

        ctx.beginPath(); ctx.arc(centerX(), centerY(), maxBoundaryR, 0, Math.PI*2);
        ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255, 30, 30, 0.8)'; ctx.shadowBlur = 15; ctx.shadowColor = 'red';
        ctx.setLineDash([15, 10]); ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur = 0;

        let g = ctx.createRadialGradient(centerX()-5, centerY()-5, 2, centerX(), centerY(), earthR);
        g.addColorStop(0, '#4facfe'); g.addColorStop(1, '#001a33');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(centerX(), centerY(), earthR, 0, Math.PI*2); ctx.fill();
        if(hasMoon) { ctx.fillStyle = '#777'; ctx.beginPath(); ctx.arc(moon.x, moon.y, moonR, 0, Math.PI*2); ctx.fill(); }

        if(sat.trail.length > 1) {
            ctx.lineWidth = 1.5;
            for(let i = 1; i < sat.trail.length; i++){
                ctx.beginPath(); 
                let alpha = (gameState === 'success') ? sat.trail[i].op*0.8 : sat.trail[i].op*0.35;
                ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
                ctx.moveTo(sat.trail[i-1].x, sat.trail[i-1].y); ctx.lineTo(sat.trail[i].x, sat.trail[i].y); ctx.stroke();
            }
        }
        aiSats.forEach(ai => {
            if (ai.trail.length > 1) {
                ctx.lineWidth = 1; ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
                ai.trail.forEach((p, idx) => { if(idx===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
                ctx.stroke();
            }
        });

        if(sat.opacity > 0 && gameState !== 'crashed_earth' && gameState !== 'crashed_moon' && gameState !== 'crashed_ai') {
            ctx.save(); ctx.globalAlpha = sat.opacity;
            ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(sat.x, sat.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
        aiSats.forEach(ai => {
            ctx.fillStyle = '#f0f'; ctx.beginPath(); ctx.arc(ai.x, ai.y, 3, 0, Math.PI*2); ctx.fill();
        });

        particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; });

        if(isSwiping) {
            let p = {x:sat.x, y:sat.y, vx:(swipeStart.x-swipeEnd.x)*swipeSens, vy:(swipeStart.y-swipeEnd.y)*swipeSens};
            ctx.beginPath(); ctx.setLineDash([5,5]); ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.moveTo(p.x, p.y);
            for(let i=0; i<200; i++) {
                let a = getAcc(p, moon); p.vx += a.ax*0.1; p.vy += a.ay*0.1; p.x += p.vx*0.1; p.y += p.vy*0.1;
                if(a.rE > maxBoundaryR) ctx.strokeStyle = '#ff3333';
                ctx.lineTo(p.x, p.y); if(a.rE < earthR || (hasMoon && a.rM < moonR)) break;
            }
            ctx.stroke(); ctx.setLineDash([]);
        }
        updateUI();
    }

    function updateUI() {
        let cur = getAcc(sat, moon);
        uiOrbit.innerText = (Math.abs(sat.angleSum) / (Math.PI * 2)).toFixed(1);
        uiMaxDist.innerText = Math.round(Math.max(0, sat.maxR - earthR));
        uiSpeed.innerText = (Math.sqrt(sat.vx*sat.vx + sat.vy*sat.vy)).toFixed(1);
        uiSignal.innerText = cur.rE > maxBoundaryR * 0.8 ? "微弱" : "良好";
        uiSignal.style.color = cur.rE > maxBoundaryR * 0.8 ? "#f33" : "#0f0";

        if(gameState !== 'orbiting' && gameState !== 'ready') {
            if (gameState !== 'lost_signal' || sat.opacity <= 0) { resetBtn.style.display = 'block'; }
            if(gameState === 'success') { 
                uiStatus.innerHTML = '<span class="success">ミッション完了！</span>'; 
                evalScore(); 
            } else {
                const msgs = { 'crashed_earth': '大気圏突入', 'crashed_moon': '月に激突', 'lost_signal': '通信途絶', 'crashed_ai': '他機衛星と衝突' };
                uiStatus.innerHTML = `<span class="warning">${msgs[gameState] || '失敗'}</span>`;
                if(gameState !== 'success') scoreDetails.style.display = 'none';
            }
        }
    }

    function evalScore() {
        const dS = Math.floor(Math.min(5000, (sat.maxR / maxBoundaryR) * 5000));
        const avgEcc = sat.eccCount > 0 ? sat.totalEcc / sat.eccCount : 1;
        const bS = Math.floor(Math.max(0, (1 - avgEcc) * 5000));
        scoreDetails.style.display = 'block'; 
        scoreDetails.innerHTML = `
            <div style="font-size: 0.8em; color: #aaa; margin-bottom: 5px;">
                モード: ${targetOrbits}周 / 月:${hasMoon?'アリ':'ナシ'} / AI襲来:${hasAiMission?'アリ':'ナシ'}
            </div>
            到達高度:${dS} / 軌道美:${bS}<br><strong style="font-size:1.4em; color:#0f0;">合計: ${dS + bS}</strong>`;
    }

    function resetGame() { sat.trail = []; sat.angleSum = 0; isLaunching = true; gameState = 'ready'; uiStatus.innerHTML = ''; resetBtn.style.display = 'none'; scoreDetails.style.display = 'none'; particles = []; aiSats = []; nasaAlert.style.display = 'none'; warningInfo.active = false; launchTimer = LAUNCH_CYCLE - 120; sat.opacity = 1.0; }
    
    function showModal(t) { 
        document.getElementById('modal').style.display = 'block';
        const content = document.getElementById('modal-content');
        if (t === 'rules') {
            content.innerHTML = `
                <h3>[ ルール ]</h3>
                ・地球を安定して<b>${targetOrbits}周</b>せよ。<br>
                ・赤い境界線を越えると<b>通信途絶</b>となり、徐々に衛星が消失する。<br>
                ・天体や他機に接触すると<b>機体大破</b>。<br><br>
                <b>[ 妨害衛星 ]</b><br>
                ・紫色の機体は地球から定期的に打ち上げられる衛星。<br>
                ・地球の地表から空に向けて豪快に打ち出され、あなたの軌道を横切る障害物となる。
            `;
        } else if (t === 'ctrl') {
            content.innerHTML = `
                <h3>[ 操作方法 ]</h3>
                <b>・衛星をフリック</b>: 引いた方向と逆に射出。<br>
                <b>・時間速度スライダー</b>: 右下のバーで物理演算の速度を変更。<br>
                <b>・コツ</b>: 低速(0.5x)で慎重に角度を決め、安定したら高速(5.0x)で見守ろう。
            `;
        } else if (t === 'settings') {
            content.innerHTML = `
                <h3>[ モード設定 ]</h3>
                <div class="setting-row"><label>周回数: <span id="o-val">${targetOrbits}</span></label><input type="range" min="1" max="20" value="${targetOrbits}" oninput="targetOrbits=parseInt(this.value);document.getElementById('o-val').innerText=this.value;document.getElementById('target-orbit-display').innerText=this.value;document.getElementById('target-orbit-msg').innerText=this.value;"></div>
                <div class="setting-row"><label><input type="checkbox" ${hasMoon ? 'checked' : ''} onchange="hasMoon=this.checked"> 月を表示</label></div>
                <div class="setting-row"><label><input type="checkbox" ${hasAiMission ? 'checked' : ''} onchange="hasAiMission=this.checked"> 衛星の打ち上げ妨害</label></div>
            `;
        }
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    const getP = (e) => { let t = e.touches ? e.touches[0] : e; return {x: t.clientX, y: t.clientY}; };
    canvas.addEventListener('mousedown', e => { if(isLaunching){ isSwiping = true; swipeStart = getP(e); swipeEnd = swipeStart; } });
    window.addEventListener('mousemove', e => { if(isSwiping) swipeEnd = getP(e); });
    window.addEventListener('mouseup', () => { if(isSwiping){ isSwiping = false; sat.vx = (swipeStart.x-swipeEnd.x)*swipeSens; sat.vy = (swipeStart.y-swipeEnd.y)*swipeSens; if(Math.abs(sat.vx)>1){ isLaunching = false; gameState = 'orbiting'; } } });
    canvas.addEventListener('touchstart', e => { if(isLaunching){ isSwiping = true; swipeStart = getP(e); swipeEnd = swipeStart; e.preventDefault();} }, {passive:false});
    window.addEventListener('touchmove', e => { if(isSwiping){ swipeEnd = getP(e); e.preventDefault();} }, {passive:false});
    window.addEventListener('touchend', () => { if(isSwiping){ isSwiping = false; sat.vx = (swipeStart.x-swipeEnd.x)*swipeSens; sat.vy = (swipeStart.y-swipeEnd.y)*swipeSens; if(Math.abs(sat.vx)>1){ isLaunching = false; gameState = 'orbiting'; } } });
    gameLoop();
</script>
</body>
</html>
